<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Bhavna ❤️</title>
    
    <!-- Simple fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fdf0f5, #fcd9e6);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Floating hearts - sirf tumhare wale emojis */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
            animation: floatAround 8s infinite ease-in-out;
        }

        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        /* Main card */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Entry overlay */
        .entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fcd9e6;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .entry-box {
            background: white;
            padding: 2.5rem;
            border-radius: 60px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            border: 3px solid #ffb3c6;
        }

        .entry-box h2 {
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            color: #ff4d6d;
            line-height: 1.2;
        }

        .entry-btn {
            background: #ffb3c6;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            margin-top: 1.5rem;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 4px 0 #b34f68;
            transition: 0.1s;
        }

        .entry-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .entry-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Main content */
        .main-content {
            display: none;
        }

        .main-content.show {
            display: block;
            animation: pop 0.5s;
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Profile section */
        .profile {
            margin-bottom: 1.5rem;
        }

        .cake-big {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .name {
            font-family: 'Sacramento', cursive;
            font-size: 4.5rem;
            color: #ff4d6d;
            line-height: 1;
            margin: 0.2rem 0;
        }

        .badge {
            background: #ffb3c6;
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 500;
            border: 2px solid white;
        }

        /* Message box */
        .message {
            background: #fff5f9;
            border-radius: 40px;
            padding: 1.8rem;
            margin: 1.8rem 0;
            border: 2px dashed #ff99bb;
        }

        .message p {
            color: #4a2f36;
            line-height: 2;
            font-size: 0.95rem;
        }

        .emoji-line {
            background: white;
            padding: 0.8rem;
            border-radius: 40px;
            margin: 1.2rem 0 0.5rem;
            font-size: 1.2rem;
            border: 1px solid #ffb3c6;
        }

        .emoji-line span {
            margin: 0 5px;
        }

        /* Affection row - sirf tumhare emojis */
        .affection-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .affection-item {
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            border: 2px solid #ffb3c6;
            box-shadow: 0 3px 0 #ffb3c6;
        }

        .affection-number {
            font-size: 2rem;
            font-weight: 600;
            color: #ff4d6d;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .affection-label {
            font-size: 0.8rem;
            color: #7c4f5c;
        }

        /* Cake section */
        .cake-area {
            background: #ffeaf2;
            border-radius: 70px 70px 30px 30px;
            padding: 2rem 1rem;
            margin: 1.5rem 0;
            border: 3px solid white;
        }

        .cake-emoji {
            position: relative;
            display: inline-block;
            font-size: 5rem;
        }

        .candle-stick {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 30px;
            background: #fad1b0;
            border-radius: 4px;
        }

        .candle-flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 30px;
            background: radial-gradient(circle at 40% 30%, #fff9e6, #ffb347);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 -5px 20px #ff8c00;
            animation: flameFlicker 0.1s infinite alternate;
        }

        .candle-flame.hide {
            display: none;
        }

        @keyframes flameFlicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1); }
        }

        .blow-button {
            background: #ffb3c6;
            border: 3px solid white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2f1a21;
            cursor: pointer;
            box-shadow: 0 5px 0 #b34f68;
            transition: 0.1s;
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .blow-button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        .blow-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 5px 0 #b34f68;
        }

        /* Wish reveal */
        .wish-text {
            font-family: 'Sacramento', cursive;
            font-size: 3rem;
            color: #ff4d6d;
            margin: 1rem 0;
            display: none;
            animation: wishPop 0.5s;
        }

        @keyframes wishPop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .wish-text.show {
            display: block;
        }

        /* Footer emojis - sirf tumhare wale */
        .footer-emojis {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            font-size: 1.8rem;
            margin-top: 1rem;
            opacity: 0.7;
        }

        /* Simple burst effect */
        .burst-emoji {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: burstFly 1.5s forwards;
        }

        @keyframes burstFly {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--x), var(--y)); opacity: 0; }
        }

        /* Music button */
        .music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 0.8rem;
            border-radius: 50%;
            font-size: 1.2rem;
            border: 2px solid #ffb3c6;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 3px 0 #ffb3c6;
        }

        .music-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- Floating emojis - sirf tumhare wale -->
    <div class="floating-emoji" style="left: 5%; top: 20%;">🩷</div>
    <div class="floating-emoji" style="right: 8%; top: 15%;">💗</div>
    <div class="floating-emoji" style="left: 15%; bottom: 25%;">💕</div>
    <div class="floating-emoji" style="right: 12%; bottom: 20%;">❤️</div>
    <div class="floating-emoji" style="left: 20%; top: 60%;">💋</div>
    <div class="floating-emoji" style="right: 20%; top: 70%;">🥹</div>
    <div class="floating-emoji" style="left: 10%; top: 80%;">🤭</div>
    <div class="floating-emoji" style="right: 15%; top: 40%;">🧿</div>

    <!-- Entry Screen -->
    <div class="entry-screen" id="entryScreen">
        <div class="entry-box">
            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🥹🩷</div>
            <h2>Bhavna</h2>
            <p style="color: #7c4f5c; margin: 0.5rem 0;">❤️💕💗</p>
            <button class="entry-btn" onclick="openCard()">
                Click karo na 💋
            </button>
        </div>
    </div>

    <!-- Main Birthday Card -->
    <div class="main-content" id="mainContent">
        <div class="card">
            <div class="profile">
                <div class="cake-big">🎂</div>
                <h1 class="name">Bhavna</h1>
                <span class="badge">Happy Birthday 🩷</span>
            </div>

            <!-- Message box -->
            <div class="message">
                <p>
                    <span style="font-size: 1.3rem; font-weight: 500; color: #ff4d6d;">My Bhavna 🩷</span><br><br>
                    Aaj ka din special hai kyuki aapka birthday hai! 
                    Bas itna chahta hoon ki aap hamesha khush raho ❤️
                </p>
                <div class="emoji-line">
                    <span>💋</span> <span>🩷</span> <span>💗</span> <span>💕</span> <span>❤️</span> <span>🥹</span> <span>🤭</span> <span>🧿</span>
                </div>
            </div>

            <!-- Affection row - simple -->
            <div class="affection-row">
                <div class="affection-item">
                    <div class="affection-number">
                        <span>💋</span> 1
                    </div>
                    <div class="affection-label">kiss</div>
                </div>
                <div class="affection-item">
                    <div class="affection-number">
                        <span>🩷</span> 1
                    </div>
                    <div class="affection-label">dil</div>
                </div>
                <div class="affection-item">
                    <div class="affection-number">
                        <span>🧿</span> 1
                    </div>
                    <div class="affection-label">nazar</div>
                </div>
            </div>

            <!-- Cake section -->
            <div class="cake-area">
                <div style="text-align: center;">
                    <div class="cake-emoji">
                        <div class="candle-stick"></div>
                        <div class="candle-flame" id="flame"></div>
                        <span>🎂</span>
                    </div>
                    
                    <button class="blow-button" id="blowBtn" onclick="blowCandle()">
                        <span>🌬️</span> Phuko candle <span>💋</span>
                    </button>

                    <div class="wish-text" id="wishMessage">
                        Happy Birthday Bhavna! 🩷💋
                    </div>
                </div>
            </div>

            <!-- Footer with tumhare emojis -->
            <div class="footer-emojis">
                <span>🥹</span>
                <span>🤭</span>
                <span>❤️</span>
                <span>💕</span>
                <span>💗</span>
                <span>🧿</span>
            </div>
        </div>
    </div>

    <!-- Music button (optional) -->
    <div class="music-btn" onclick="playMusic()">
        🎵
    </div>

    <audio id="bgMusic" loop>
        <source src="aud.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Open card function
        function openCard() {
            document.getElementById('entryScreen').classList.add('hide');
            document.getElementById('mainContent').classList.add('show');
            
            // Try music
            const music = document.getElementById('bgMusic');
            music.play().catch(() => {});
            
            // Small burst on open
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createBurst(['💋', '🩷', '💗', '💕', '❤️', '🥹', '🤭', '🧿']);
                }, i * 30);
            }
        }

        // Create burst with tumhare emojis
        function createBurst(emojis) {
            const emoji = document.createElement('div');
            emoji.className = 'burst-emoji';
            emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = '50%';
            emoji.style.top = '50%';
            emoji.style.setProperty('--x', (Math.random() - 0.5) * 300 + 'px');
            emoji.style.setProperty('--y', (Math.random() - 0.5) * 300 + 'px');
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 1500);
        }

        // Blow candle function
        function blowCandle() {
            const flame = document.getElementById('flame');
            const btn = document.getElementById('blowBtn');
            const wish = document.getElementById('wishMessage');
            
            if (flame.classList.contains('hide')) return;
            
            flame.classList.add('hide');
            btn.disabled = true;
            wish.classList.add('show');

            // Create burst - 300 emojis (perfect amount)
            const emojis = ['💋', '🩷', '💗', '💕', '❤️', '🥹', '🤭', '🧿'];
            
            for (let i = 0; i < 300; i++) {
                setTimeout(() => {
                    createBurst(emojis);
                }, i * 5);
            }
        }

        // Music play/pause
        function playMusic() {
            const music = document.getElementById('bgMusic');
            if (music.paused) {
                music.play();
            } else {
                music.pause();
            }
        }

        // Make functions global
        window.openCard = openCard;
        window.blowCandle = blowCandle;
        window.playMusic = playMusic;
    </script>
</body>
</html>
