<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eternal rose · bhavna</title>
    
    <!-- fonts + refined feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,200;0,300;0,400;1,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        /* ----- ROOT: DEEP LUXURY & ROSE TONES ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --deep-velvet: #0a0507;        // black with warmth
            --petal-pink: #ffb6c1;
            --gold-thread: #c6a15b;
            --rose-shadow: rgba(255, 180, 200, 0.25);
            --glass-panel: rgba(20, 10, 15, 0.55);
            --candle-core: #ffb347;
            --candle-glow: #ff7e5f;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--deep-velvet);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: #fdeff2;
        }

        /* ---------- PHOTIC CANVAS (STARFIELD + ROSES) ---------- */
        #cosmic-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            display: block;
        }

        /* ---------- DREAM LAYER (GLASS CARD + ROSE VIGNETTE) ---------- */
        .content-wrapper {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 2.2s cubic-bezier(0.2, 0.9, 0.3, 1), transform 2.2s ease;
            will-change: transform, opacity;
        }

        .content-wrapper.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* floating rose pedals (css generated) */
        .rose-petal {
            position: absolute;
            pointer-events: none;
            color: rgba(255, 180, 190, 0.5);
            font-size: 1.8rem;
            z-index: 5;
            filter: drop-shadow(0 0 6px #ffa5b0);
            animation: petalFall 14s linear infinite;
        }

        @keyframes petalFall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.7; }
            80% { opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(300deg) scale(1.4); opacity: 0; }
        }

        /* ------- MAIN CARD (ETCHED IN LIGHT) ------- */
        .glass-sonnet {
            background: var(--glass-panel);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2.5rem 1rem 2.5rem 1rem;
            border: 1px solid rgba(255, 215, 200, 0.25);
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(255, 175, 180, 0.2) inset;
            padding: 2rem 1.8rem;
            max-width: 420px;
            width: 90%;
            margin-bottom: 1.8rem;
            transition: box-shadow 0.4s;
        }

        .glass-sonnet:hover {
            box-shadow: 0 30px 55px #200f15, 0 0 15px var(--rose-shadow);
        }

        .header-label {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--gold-thread);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 300;
            margin-bottom: 0.3rem;
            word-spacing: 4px;
        }

        .main-name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(4rem, 16vw, 7rem);
            background: linear-gradient(145deg, #ffe5ea, #ffb6c1 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin: 0.2rem 0 0.8rem 0;
            filter: drop-shadow(0 5px 8px #300f1a);
        }

        .message-card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            border: 1px solid rgba(255, 188, 193, 0.3);
            box-shadow: 0 10px 25px -10px #faa0b5;
            margin: 1rem 0 1.8rem 0;
            backdrop-filter: blur(4px);
        }

        .message-text {
            font-weight: 200;
            font-size: 1rem;
            line-height: 1.9;
            font-style: italic;
            color: #ffeef0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* ----- CAKE + FLAME (REFINED ANIMATION) ----- */
        .cake-altar {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 1.2rem 0 0.8rem;
        }

        .cake-container {
            position: relative;
            width: 140px;
            height: 130px;
            margin: 0 auto 0.5rem;
            filter: drop-shadow(0 10px 18px #3a1e26);
        }

        .cake-graphic {
            font-size: 90px;
            display: block;
            line-height: 1;
            transform: scale(1.1);
        }

        .candle-stick {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 26px;
            background: linear-gradient(145deg, #f2e6d5, #d4b89c);
            border-radius: 4px 4px 2px 2px;
            box-shadow: 0 4px 6px #1e0f13;
        }

        .candle-flame {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 36px;
            background: radial-gradient(circle at 40% 20%, #fff9e6, #ffe285, #ff5e4a);
            border-radius: 60% 40% 30% 70%;
            box-shadow: 0 0 30px #ffb065, 0 0 60px #fd7e5e;
            animation: flicker-soft 0.12s infinite alternate;
            will-change: transform, box-shadow, opacity;
        }

        @keyframes flicker-soft {
            0% { transform: translateX(-50%) scale(1) skewX(1deg); opacity: 0.95; filter: brightness(1); }
            100% { transform: translateX(-50%) scale(1.15) skewX(-2deg); opacity: 1; filter: brightness(1.3); }
        }

        /* ----- ACTION BUTTON (OPULENT) ----- */
        .action-button {
            background: linear-gradient(125deg, #ffb7c5, #ff9eb0);
            border: none;
            padding: 0.9rem 2.4rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #1a0a0f;
            text-transform: uppercase;
            box-shadow: 0 10px 30px #ff4d6d55, 0 0 0 1px #feb5c3 inset;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 30;
            backdrop-filter: blur(2px);
        }

        .action-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px #ff8aa1;
        }

        #reveal-wish {
            display: none;
            font-family: 'Great Vibes', cursive;
            font-size: 3.3rem;
            background: linear-gradient(145deg, #ffdbb5, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0 0.5rem;
            filter: drop-shadow(0 0 25px #f9a8b8);
            animation: pulse-reveal 2.4s infinite;
        }

        @keyframes pulse-reveal {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.07); opacity: 1; filter: drop-shadow(0 0 35px #ffa5bc); }
        }

        /* ----- BUTTERFLY (ELEGANT & 3D) ----- */
        .butterfly-luxury {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 15;
            filter: drop-shadow(0 0 6px gold) drop-shadow(0 0 15px #ff9eb5);
            animation: flyPath 22s infinite alternate ease-in-out;
            will-change: transform, left, top;
        }

        @keyframes flyPath {
            0% { left: -8%; top: 20%; transform: rotate(5deg); }
            20% { left: 25%; top: 45%; transform: rotate(-10deg) scale(0.9); }
            40% { left: 50%; top: 15%; transform: rotate(20deg) scale(1.2); }
            60% { left: 75%; top: 60%; transform: rotate(-5deg) scale(1); }
            80% { left: 90%; top: 30%; transform: rotate(15deg) scale(1.1); }
            100% { left: 105%; top: 70%; transform: rotate(-8deg); }
        }

        /* loading overlay -> romantic threshold */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, #1f0d12, #020202);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 2s ease;
            backdrop-filter: blur(8px);
        }

        .heart-locket {
            font-size: 6rem;
            animation: heartbeat 1.8s infinite;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 28px #ff99aa);
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.2); }
            35% { transform: scale(1); }
            45% { transform: scale(1.1); }
            55% { transform: scale(1); }
        }

        .entry-button {
            background: transparent;
            border: 1.5px solid #ffadbc;
            color: #ffced9;
            padding: 1rem 2.8rem;
            border-radius: 60px;
            font-size: 0.9rem;
            letter-spacing: 6px;
            font-weight: 300;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.6s;
        }

        .entry-button:hover, .entry-button:active {
            background: #ffb0bd;
            color: #1b070c;
            border-color: #ffb0bd;
            box-shadow: 0 0 45px #ff90aa;
            font-weight: 500;
        }

        .music-indicator {
            position: fixed;
            bottom: 24px;
            right: 24px;
            opacity: 0.45;
            font-size: 1.6rem;
            z-index: 100;
            filter: drop-shadow(0 0 6px pink);
            pointer-events: none;
        }

        /* ---------- responsiveness ---------- */
        @media (max-width: 440px) {
            .main-name { font-size: 4rem; }
            .glass-sonnet { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- ========== INTRO GATE ========== -->
    <div id="loading-overlay">
        <div class="heart-locket">🩷</div>
        <button class="entry-button" onclick="startExperience()">unfold · bhavna</button>
    </div>

    <!-- ========== COSMIC CANVAS (STARDUST + FLOATING HEARTS) ========== -->
    <canvas id="cosmic-canvas"></canvas>

    <!-- ========== MAIN UI (LAVERED ROMANCE) ========== -->
    <div class="content-wrapper" id="main-ui">
        <div class="glass-sonnet">
            <p class="header-label">for eternity</p>
            <h1 class="main-name">Bhavna</h1>
        </div>
        
        <div class="message-card">
            <p class="message-text">
                "you are the poetry i didn’t know i was searching for —<br> 
                every glance a verse, every heartbeat your name. 
                happy birthday, my infinite rose. 🩷"
            </p>
        </div>

        <!-- cake & flame -->
        <div class="cake-altar">
            <div class="cake-container">
                <div class="candle-flame" id="flame-node"></div>
                <div class="candle-stick"></div>
                <span class="cake-graphic">🎂</span>
            </div>
        </div>
        
        <button class="action-button" id="blow-btn" onclick="executeBlowAction()">🌹 blow · candle 🌹</button>
        <div id="reveal-wish">i love you, Bhavna</div>
    </div>

    <!-- audio + subtle icon -->
    <audio id="bg-track" loop>
        <source src="aud.mp3" type="audio/mpeg">
    </audio>
    <div class="music-indicator">🎵 🩷</div>

    <script>
        (function() {
            // ---------- master config ----------
            const canvas = document.getElementById('cosmic-canvas');
            const ctx = canvas.getContext('2d');
            const ui = document.getElementById('main-ui');
            const overlay = document.getElementById('loading-overlay');
            const audioNode = document.getElementById('bg-track');

            let width, height;
            let particleRoses = [];          // canvas particles
            let blown = false;                // candle state
            let butterflyInterval, petalInterval;

            // ---------- canvas resize ----------
            function setCanvasSize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', setCanvasSize);
            setCanvasSize();

            // ---------- enhanced particle: rose + spark ----------
            class RoseParticle {
                constructor(isBlast = false) {
                    this.isBlast = isBlast;
                    this.reset();
                }

                reset() {
                    this.x = Math.random() * width;
                    this.y = height + (Math.random() * (this.isBlast ? 900 : 400));
                    this.size = Math.random() * (this.isBlast ? 30 : 16) + 8;
                    this.speedY = Math.random() * (this.isBlast ? 3.4 : 1.1) + 0.5;
                    this.drift = Math.sin(Math.random() * 10) * 0.5;
                    this.phase = Math.random() * 6.28;
                    this.opacity = Math.random() * 0.4 + 0.3;
                    this.emoji = (Math.random() > 0.4) ? '🩷' : '🌹';     // mix hearts & roses
                }

                move() {
                    this.y -= this.speedY;
                    this.x += Math.sin(Date.now() * 0.002 + this.phase) * this.drift;

                    if (this.y < -100) {
                        if (this.isBlast) {
                            // keep them for a while, then reset
                            this.y = height + Math.random() * 150;
                        } else {
                            this.reset();
                        }
                    }
                }

                draw() {
                    ctx.globalAlpha = this.opacity * (0.7 + 0.3 * Math.sin(Date.now() * 0.005 + this.phase));
                    ctx.font = `${this.size}px 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', system-ui, sans-serif`;
                    ctx.fillStyle = '#ffb7c5';
                    ctx.fillText(this.emoji, this.x, this.y);
                }
            }

            // ---------- background particles (80 gentle) ----------
            function generateBackgroundRoses() {
                for (let i = 0; i < 80; i++) {
                    particleRoses.push(new RoseParticle(false));
                }
            }

            // ---------- BUTTERFLY SYSTEM (organic, 2 at a time) ----------
            function spawnButterflies() {
                if (document.hidden) return;
                for (let i=0; i<2; i++) {
                    const butterfly = document.createElement('div');
                    butterfly.className = 'butterfly-luxury';
                    butterfly.innerHTML = '🦋';
                    butterfly.style.left = '-10%';
                    butterfly.style.top = Math.random() * 70 + 10 + '%';
                    butterfly.style.animationDuration = (18 + Math.random() * 12) + 's';
                    butterfly.style.fontSize = (1.8 + Math.random() * 1.2) + 'rem';
                    document.body.appendChild(butterfly);
                    setTimeout(() => butterfly.remove(), 22000);
                }
            }

            // ---------- floating rose petals (CSS) ----------
            function spawnPetal() {
                if (!ui.classList.contains('active')) return;
                const petal = document.createElement('div');
                petal.className = 'rose-petal';
                petal.innerHTML = '🌹';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (10 + Math.random() * 12) + 's';
                petal.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
                petal.style.opacity = 0.5 + Math.random() * 0.3;
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 15000);
            }

            // ---------- START EXPERIENCE (gate) ----------
            window.startExperience = function() {
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 1600);

                audioNode.play().catch(() => console.log('audio requires gesture'));

                setTimeout(() => {
                    ui.classList.add('active');
                    generateBackgroundRoses();

                    // start animation loops (canvas)
                    if (!window.animFrame) {
                        window.animFrame = requestAnimationFrame(animateCanvas);
                    }

                    // spawn butterflies every 5 sec
                    butterflyInterval = setInterval(spawnButterflies, 5000);
                    // petals every 2 sec
                    petalInterval = setInterval(spawnPetal, 1800);

                    // initial two butterflies
                    setTimeout(spawnButterflies, 200);
                    setTimeout(spawnButterflies, 1200);
                }, 600);
            };

            // ---------- CANVAS ANIMATION LOOP (smooth 60fps) ----------
            function animateCanvas() {
                ctx.clearRect(0, 0, width, height);

                // extra glow effect
                ctx.shadowColor = '#ffb7c5';
                ctx.shadowBlur = 12;
                
                for (let p of particleRoses) {
                    p.move();
                    p.draw();
                }

                ctx.shadowBlur = 0;

                window.animFrame = requestAnimationFrame(animateCanvas);
            }

            // ---------- BLOW CANDLE (MEGA 850+ HEARTS) ----------
            window.executeBlowAction = function() {
                if (blown) return;
                blown = true;

                // hide flame & button
                const flame = document.getElementById('flame-node');
                const btn = document.getElementById('blow-btn');
                const wish = document.getElementById('reveal-wish');
                if (flame) flame.style.display = 'none';
                if (btn) btn.style.display = 'none';
                if (wish) wish.style.display = 'block';

                // add 950 intense explosion hearts/roses
                for (let i = 0; i < 950; i++) {
                    setTimeout(() => {
                        const blast = new RoseParticle(true);
                        blast.emoji = Math.random() > 0.3 ? '🩷' : '🌹';
                        blast.size = 16 + Math.random() * 26;
                        blast.opacity = 0.9;
                        blast.speedY = 2.5 + Math.random() * 5;
                        blast.y = height - 50 - (i % 200);  // varied origin
                        blast.x = width / 2 + (Math.random() - 0.5) * 500;
                        particleRoses.push(blast);
                    }, i * 2.2);   // smooth staggered
                }
            };

            // ---------- extra cleanup for intervals ----------
            window.addEventListener('beforeunload', () => {
                if (butterflyInterval) clearInterval(butterflyInterval);
                if (petalInterval) clearInterval(petalInterval);
            });

            // simulate flame always there initially, but blow works
            // lazy audio trigger on any click if needed
            document.body.addEventListener('click', function enableAudio() {
                if (audioNode.paused && ui.classList.contains('active')) {
                    audioNode.play().catch(() => {});
                }
            }, { once: true });

        })();
    </script>
</body>
</html>
