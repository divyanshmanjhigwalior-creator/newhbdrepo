<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Bhavna! 💗</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0507;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .simple-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #2a0f15, #0a0507);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(20, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px 20px 40px 20px;
            padding: 2rem 1.5rem;
            max-width: 380px;
            width: 90%;
            border: 1px solid rgba(255, 180, 190, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }

        .entry {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0507;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .entry-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 40px;
            text-align: center;
            border: 1px solid rgba(255, 180, 190, 0.3);
            max-width: 300px;
            width: 90%;
        }

        .entry-box h2 {
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            color: #ffb6c1;
            margin: 0.2rem 0;
        }

        .entry-btn {
            background: transparent;
            border: 1.5px solid #ffadbc;
            color: #ffced9;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            margin-top: 1.5rem;
            cursor: pointer;
        }

        .entry-btn:active {
            background: #ffb0bd;
            color: #1b070c;
        }

        .entry.hide {
            opacity: 0;
            pointer-events: none;
        }

        .header-label {
            font-family: 'Sacramento', cursive;
            color: #c6a15b;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 0.2rem;
        }

        .name {
            font-family: 'Sacramento', cursive;
            font-size: 4.5rem;
            background: linear-gradient(145deg, #ffe5ea, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin: 0.2rem 0;
        }

        /* Image styles with fallback */
        .image-top {
            width: 130px;
            height: 130px;
            border-radius: 65px;
            border: 4px solid #ffb6c1;
            margin: 0.5rem auto 1.2rem auto;
            object-fit: cover;
            display: block;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            background: #ffb6c1; /* fallback color */
        }

        .image-bottom {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            border: 4px solid #ffb6c1;
            margin: 1.5rem auto 0.2rem auto;
            object-fit: cover;
            display: block;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            background: #ffb6c1; /* fallback color */
        }

        .message-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 1.5rem;
            margin: 1.2rem 0;
            border: 1px solid rgba(255, 188, 193, 0.3);
        }

        .message-text {
            color: #ffeef0;
            font-size: 0.95rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .emoji-line {
            margin-top: 1rem;
            font-size: 1.5rem;
            letter-spacing: 8px;
        }

        .counter-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.2rem 0;
        }
        
        .counter-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 200, 0.3);
        }
        
        .counter-number {
            font-size: 1.8rem;
            color: #ffb6c1;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .counter-label {
            font-size: 0.7rem;
            color: #ffced9;
        }

        .cake-container {
            position: relative;
            display: inline-block;
            font-size: 5rem;
            margin: 1rem 0;
        }

        .candle-stick {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 26px;
            background: #f2e6d5;
            border-radius: 4px;
        }

        .candle-flame {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 36px;
            background: radial-gradient(circle at 40% 20%, #fff9e6, #ffe285, #ff5e4a);
            border-radius: 60% 40% 30% 70%;
            box-shadow: 0 0 30px #ffb065;
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1); }
        }

        .candle-flame.hide {
            display: none;
        }

        .action-button {
            background: linear-gradient(125deg, #ffb7c5, #ff9eb0);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            color: #1a0a0f;
            cursor: pointer;
            margin: 1rem 0;
            border: 1px solid #ffe2ec;
        }

        .action-button:active {
            transform: scale(0.95);
        }

        .action-button:disabled {
            opacity: 0.5;
        }

        #reveal-wish {
            display: none;
            font-family: 'Sacramento', cursive;
            font-size: 2.8rem;
            color: #ffb6c1;
            margin: 1rem 0;
        }

        #reveal-wish.show {
            display: block;
        }

        .burst-emoji {
            position: absolute;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 9999;
            animation: burst 1s forwards;
        }

        @keyframes burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--x), var(--y)); opacity: 0; }
        }

        .music-indicator {
            position: fixed;
            bottom: 15px;
            right: 15px;
            opacity: 0.4;
            font-size: 1.3rem;
            z-index: 100;
            cursor: pointer;
        }

        /* Debug border - image dikhegi ya nahi */
        .debug-img {
            border: 2px solid red;
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="simple-bg"></div>

    <!-- Entry Screen -->
    <div class="entry" id="entryScreen">
        <div class="entry-box">
            <div style="font-size: 3rem; margin-bottom: 0.5rem;">🩷</div>
            <h2>Bhavna</h2>
            <p style="color: #ffced9;">tap to open</p>
            <button class="entry-btn" onclick="openCard()">open</button>
        </div>
    </div>

    <!-- Main Card -->
    <div class="card" id="mainCard" style="display: none;">
        
        <!-- ===== IMAGE 1 - TOP ===== -->
        <!-- YAHAN EXACT NAAM DAALO -->
        <img class="image-top" src="image1.png" alt="Bhavna" 
             onerror="this.src='https://via.placeholder.com/130x130/ffb6c1/ffffff?text=Bhavna'">
        <!-- Agar image nahi milti to placeholder dikhega -->
        
        <div class="header-label">happy birthday</div>
        <h1 class="name">Bhavna</h1>
        
        <!-- Message -->
        <div class="message-card">
            <p class="message-text">
                happy birthday to the sweetest person. 
                may your day be filled with joy and love! 💗
            </p>
            <div class="emoji-line">
                💋 🩷 💗 💕 ❤️ 🥹 🤭 🧿
            </div>
        </div>

        <!-- Counters -->
        <div class="counter-row">
            <div class="counter-item">
                <div class="counter-number"><span>💋</span> 1</div>
                <div class="counter-label">kiss</div>
            </div>
            <div class="counter-item">
                <div class="counter-number"><span>🩷</span> 1</div>
                <div class="counter-label">heart</div>
            </div>
        </div>

        <!-- Cake -->
        <div class="cake-container">
            <div class="candle-flame" id="flame"></div>
            <div class="candle-stick"></div>
            <span>🎂</span>
        </div>
        
        <button class="action-button" id="blowBtn" onclick="blowCandle()">🌬️ blow candle</button>
        
        <div id="reveal-wish">happy birthday bhavna! 💗</div>
        
        <!-- ===== IMAGE 2 - BOTTOM ===== -->
        <!-- YAHAN EXACT NAAM DAALO -->
        <img class="image-bottom" src="image2.png" alt="Bhavna" 
             onerror="this.src='https://via.placeholder.com/100x100/ffb6c1/ffffff?text=Bhavna'">
        <!-- Agar image nahi milti to placeholder dikhega -->
        
        <!-- DEBUG INFO - AGAR IMAGE NAHI DIKHTI TO YEH DEKHO -->
        <p style="color: #ffb6c1; font-size: 0.7rem; margin-top: 1rem; opacity: 0.5;">
            Images: image1.png | image2.png
        </p>
    </div>

    <!-- Audio -->
    <audio id="bgMusic" loop>
        <source src="aud.mp3" type="audio/mpeg">
    </audio>
    <div class="music-indicator">🎵</div>

    <script>
        let blown = false;
        
        function openCard() {
            document.getElementById('entryScreen').classList.add('hide');
            document.getElementById('mainCard').style.display = 'block';
            
            const music = document.getElementById('bgMusic');
            music.play().catch(() => {});
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createBurst();
                }, i * 20);
            }
        }

        function createBurst() {
            const emojis = ['💋', '🩷', '💗', '💕', '❤️', '🥹', '🤭', '🧿'];
            const emoji = document.createElement('div');
            emoji.className = 'burst-emoji';
            emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = '50%';
            emoji.style.top = '50%';
            emoji.style.setProperty('--x', (Math.random() - 0.5) * 200 + 'px');
            emoji.style.setProperty('--y', (Math.random() - 0.5) * 200 + 'px');
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 1000);
        }

        function blowCandle() {
            if (blown) return;
            blown = true;
            
            const flame = document.getElementById('flame');
            const btn = document.getElementById('blowBtn');
            const wish = document.getElementById('reveal-wish');
            
            flame.classList.add('hide');
            btn.disabled = true;
            wish.classList.add('show');
            
            for (let i = 0; i < 200; i++) {
                setTimeout(() => {
                    createBurst();
                }, i * 5);
            }
        }

        document.querySelector('.music-indicator').addEventListener('click', function() {
            const music = document.getElementById('bgMusic');
            if (music.paused) music.play();
            else music.pause();
        });

        window.openCard = openCard;
        window.blowCandle = blowCandle;
    </script>
</body>
</html>
